<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio V3</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#fff;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.hero{
  text-align:center;
  padding:30px 15px;
}
.hero h1{
  font-size:28px;
  margin-bottom:10px;
}
.hero p{
  color:#d1d5db;
}
.section{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}
.input,.textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  box-sizing:border-box;
}
.textarea{
  min-height:100px;
  resize:vertical;
}
.button{
  margin-top:12px;
  padding:12px;
  width:100%;
  background:white;
  color:black;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
.output{
  margin-top:20px;
}
.block{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  line-height:1.6;
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>Sazio V3</h1>
    <p>Create anything. Any idea. Any content.</p>
  </div>

  <div class="section">
    <h2>AI Content Generator</h2>

    <input id="idea" class="input" placeholder="Enter your idea">
    <input id="type" class="input" placeholder="Content type (video, reel, ad, story, post)">
    <textarea id="goal" class="textarea" placeholder="What do you want? (script, idea, scenes, SEO, all)"></textarea>

    <button class="button" onclick="generate()">Generate</button>

    <div id="output" class="output"></div>
  </div>
</div>

<script>
function safeValue(v, fallback){
  return v && v.trim() ? v.trim() : fallback;
}

function generate(){
  const idea = safeValue(document.getElementById("idea").value, "content idea");
  const type = safeValue(document.getElementById("type").value, "video");
  const goal = safeValue(document.getElementById("goal").value, "script, title, scenes, and SEO");

  const lowerIdea = idea.toLowerCase();
  let hook = `Start with a strong curiosity-driven opening about ${idea}.`;
  let angle = `Make the ${type} simple, engaging, and easy to understand.`;
  let cta = `End by asking viewers to like, comment, and share.`;

  if (lowerIdea.includes("gym") || lowerIdea.includes("fitness")) {
    hook = `Start with a powerful transformation or challenge hook about ${idea}.`;
    angle = `Keep the ${type} energetic, motivational, and fast-paced.`;
    cta = `End with a fitness challenge or question for the audience.`;
  } else if (lowerIdea.includes("travel") || lowerIdea.includes("trip") || lowerIdea.includes("vlog")) {
    hook = `Start with a beautiful or surprising moment from ${idea}.`;
    angle = `Keep the ${type} immersive, scenic, and curiosity-driven.`;
    cta = `End by asking viewers where they want to travel next.`;
  } else if (lowerIdea.includes("product") || lowerIdea.includes("ad") || lowerIdea.includes("brand")) {
    hook = `Start with a problem-solution hook related to ${idea}.`;
    angle = `Keep the ${type} benefit-focused, clear, and convincing.`;
    cta = `End with a clear action like try now or learn more.`;
  } else if (lowerIdea.includes("comedy") || lowerIdea.includes("funny")) {
    hook = `Start with a surprising or awkward funny moment about ${idea}.`;
    angle = `Keep the ${type} punchy, fast, and expressive.`;
    cta = `End by asking viewers to tag a friend.`;
  } else if (lowerIdea.includes("horror") || lowerIdea.includes("scary")) {
    hook = `Start with a mysterious and unsettling moment related to ${idea}.`;
    angle = `Keep the ${type} suspenseful and curiosity-filled.`;
    cta = `End with a question that keeps viewers thinking.`;
  }

  const html = `
    <div class="block"><b>🔥 TITLE IDEAS</b><br>
    1. Viral ${type} about ${idea}<br>
    2. Best ${idea} ${type} idea for today<br>
    3. ${idea} that people will actually watch</div>

    <div class="block"><b>💡 CONTENT ANGLE</b><br>
    ${angle}</div>

    <div class="block"><b>🎣 HOOK</b><br>
    ${hook}</div>

    <div class="block"><b>🎬 SCRIPT STRUCTURE</b><br>
    1. Hook in first 3 seconds<br>
    2. Introduce the main idea<br>
    3. Build interest or problem<br>
    4. Deliver the main highlight<br>
    5. Finish with a strong ending</div>

    <div class="block"><b>🧩 SCENE BREAKDOWN</b><br>
    Scene 1: Attention-grabbing opening<br>
    Scene 2: Introduce ${idea}<br>
    Scene 3: Main development or value<br>
    Scene 4: Peak moment or reveal<br>
    Scene 5: Ending with engagement push</div>

    <div class="block"><b>🎯 USER GOAL</b><br>
    ${goal}</div>

    <div class="block"><b>📢 CTA</b><br>
    ${cta}</div>

    <div class="block"><b>🚀 SEO TAGS</b><br>
    ${idea}, ${type}, viral, trending, content creator, sazio</div>
  `;

  document.getElementById("output").innerHTML = html;
}
</script>
</body>
</html>
