<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio V3</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.hero {
  text-align: center;
  padding: 30px 15px;
}

.section {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

.input, .textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

.button {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  background: white;
  color: black;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.output {
  margin-top: 20px;
}

.block {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Sazio V3</h1>
<p>Create anything. Any idea. Any content.</p>
</div>

<div class="section">
<h2>AI Content Generator</h2>

<input id="idea" class="input" placeholder="Enter your idea" />
<input id="type" class="input" placeholder="Content type (video, reel, ad, story)" />
<textarea id="goal" class="textarea" placeholder="What do you want? (script, idea, SEO, all)"></textarea>

<button class="button" onclick="generate()">Generate</button>

<div id="output" class="output"></div>
</div>

</div>

<script>
function generate() {
  let idea = document.getElementById("idea").value;
  let type = document.getElementById("type").value;
  let goal = document.getElementById("goal").value;

  let result = `
  <div class="block"><b>🔥 TITLE IDEAS</b><br>
  - Viral ${type} about ${idea}<br>
  - Best ${idea} content idea</div>

  <div class="block"><b>💡 CONTENT IDEA</b><br>
  Create a ${type} around ${idea} with strong hook and engagement.</div>

  <div class="block"><b>🎬 SCRIPT STRUCTURE</b><br>
  1. Hook (first 3 sec)<br>
  2. Problem or curiosity<br>
  3. Main content<br>
  4. Highlight moment<br>
  5. Ending + CTA</div>

  <div class="block"><b>🎯 OUTPUT GOAL</b><br>
  ${goal}</div>

  <div class="block"><b>🚀 SEO TAGS</b><br>
  ${idea}, ${type}, viral, trending, content</div>
  `;

  document.getElementById("output").innerHTML = result;
}
</script>

</body>
</html>
