<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio V3</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  padding:20px;
}

.container {
  max-width:600px;
  margin:auto;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

input,select,textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

button {
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  background:white;
  color:black;
  font-weight:bold;
}

.result {
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.08);
  border-radius:15px;
  white-space:pre-line;
}
</style>

</head>
<body>

<div class="container">

<h1>Sazio V3</h1>
<p>Create anything. Any idea. Any content.</p>

<div class="card">

<h2>AI Content Generator</h2>

<input id="idea" placeholder="Enter your idea">
<select id="type">
  <option value="video">Video</option>
  <option value="post">Post</option>
  <option value="ad">Ad</option>
</select>

<textarea id="goal" placeholder="What do you want?"></textarea>

<button onclick="generate()">Generate</button>

<div id="output" class="result">Your result will appear here...</div>

</div>

</div>

<script>
async function generate() {

  let idea = document.getElementById("idea").value;
  let type = document.getElementById("type").value;
  let goal = document.getElementById("goal").value;

  let box = document.getElementById("output");
  box.innerHTML = "⏳ Generating with AI...";

  try {
    let res = await fetch("/api/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        idea:idea,
        type:type,
        output:goal
      })
    });

    let data = await res.json();

    box.innerText = data.result || "No result";

  } catch(e) {
    box.innerText = "Error connecting AI";
  }
}
</script>

</body>
</html>
