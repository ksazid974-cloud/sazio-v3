<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
}
.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}
input,textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
.generate { background: white; color: black; }
.copy { background: #1e293b; color: white; }
.voice { background: #2563eb; color: white; }

#output {
  margin-top: 10px;
  white-space: pre-line;
  line-height: 1.6;
}

.status {
  font-size: 14px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🚀 Sazio AI</h2>
<p>Smart Creator AI</p>
</div>

<div class="card">

<input id="idea" placeholder="Enter your idea">

<button class="generate" onclick="generate()">Generate</button>
<button class="voice" onclick="startVoice()">Voice Input</button>
<button class="copy" onclick="copyText()">Copy</button>

<div class="status" id="status">Ready</div>
<div id="output">Result will appear here...</div>

</div>

</div>

<script>
let recognition;

// 🔥 LOAD MEMORY
window.onload = function() {
  const savedIdea = localStorage.getItem("sazio_idea");
  const savedOutput = localStorage.getItem("sazio_output");

  if (savedIdea) {
    document.getElementById("idea").value = savedIdea;
  }

  if (savedOutput) {
    document.getElementById("output").innerText = savedOutput;
  }
};

// 🔥 SAVE MEMORY
function saveMemory(idea, output) {
  localStorage.setItem("sazio_idea", idea);
  localStorage.setItem("sazio_output", output);
}

// 🔥 GENERATE
async function generate() {
  const idea = document.getElementById("idea").value.trim();
  const box = document.getElementById("output");
  const status = document.getElementById("status");

  if (!idea) {
    box.innerText = "Enter idea first";
    return;
  }

  status.innerText = "Generating...";
  box.innerText = "Please wait...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ idea })
    });

    const data = await res.json();

    box.innerText = data.result;
    status.innerText = "Done";

    // 🔥 SAVE
    saveMemory(idea, data.result);

  } catch (e) {
    box.innerText = "Error";
    status.innerText = "Error";
  }
}

// 🔥 VOICE
function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice not supported");
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "hi-IN";
  recognition.interimResults = false;

  recognition.start();

  document.getElementById("status").innerText = "Listening...";

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    document.getElementById("idea").value = text;
    document.getElementById("status").innerText = "Voice captured";
  };
}

// 🔥 COPY
function copyText() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  document.getElementById("status").innerText = "Copied";
}
</script>

</body>
</html>
