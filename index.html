<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

input,select,textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.generate { background: white; color: black; }
.copy { background: #1e293b; color: white; }

#output {
  margin-top: 10px;
  white-space: pre-line;
  line-height: 1.6;
}

.status {
  font-size: 14px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🚀 Sazio AI</h2>
<p>Create viral content instantly</p>
</div>

<div class="card">
<input id="idea" placeholder="Enter your idea">
<select id="type">
<option value="video">Video</option>
<option value="post">Post</option>
<option value="story">Story</option>
</select>

<textarea id="goal" placeholder="What do you want?"></textarea>

<button class="generate" onclick="generate()">Generate</button>
<button class="copy" onclick="copyText()">Copy</button>

<div class="status" id="status">Ready</div>
<div id="output">Result will appear here...</div>
</div>

</div>

<script>
async function generate() {
  const idea = document.getElementById("idea").value.trim();
  const type = document.getElementById("type").value;
  const goal = document.getElementById("goal").value.trim();

  const box = document.getElementById("output");
  const status = document.getElementById("status");

  if (!idea) {
    box.innerText = "⚠️ Enter idea first";
    return;
  }

  status.innerText = "⚡ Generating...";
  box.innerText = "⏳ Please wait...";

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);

    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      signal: controller.signal,
      body: JSON.stringify({
        idea: idea,
        type: type,
        output: goal
      })
    });

    clearTimeout(timeout);

    const data = await res.json();

    if (!data || !data.result) {
      box.innerText = "❌ No AI response";
      status.innerText = "Error";
      return;
    }

    box.innerText = data.result;
    status.innerText = "✅ Done";

  } catch (e) {
    box.innerText = "❌ Slow internet or timeout";
    status.innerText = "Error";
  }
}

function copyText() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  document.getElementById("status").innerText = "📋 Copied";
}
</script>

</body>
</html>
