<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sazio AI ULTRA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: #ffffff;
    }
    .container { max-width: 980px; margin: 0 auto; padding: 20px; }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .hero { text-align: center; padding: 30px 20px; }
    .badge {
      display: inline-block;
      background: #ffffff;
      color: #0f172a;
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }
    h1 { font-size: 48px; margin: 12px 0; }
    .hero p { color: #cbd5e1; font-size: 19px; }
    input, select, textarea {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 16px;
      font-size: 17px;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 8px 0;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .primary { background: #ffffff; color: #0f172a; }
    .voice { background: #2563eb; color: #fff; }
    .ultra { background: linear-gradient(90deg, #ef4444, #f97316); color: #fff; font-size: 20px; padding: 20px; }
    .result {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      min-height: 300px;
      white-space: pre-line;
      line-height: 1.7;
    }
    .price-box {
      background: rgba(34,197,151,0.1);
      border: 1px solid #22c55e;
      border-radius: 16px;
      padding: 16px;
      margin: 12px 0;
    }
    .status { text-align: center; margin: 12px 0; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card hero">
      <div class="badge">100% FREE • NO WATERMARK</div>
      <h1>🚀 Sazio AI <span style="color:#ef4444">ULTRA</span></h1>
      <p>One Click → Full Video + Voice + Price Comparison + Pro Output</p>
    </div>

    <div class="card">
      <h2>Idea Bolo (One Click Magic)</h2>
      <input id="idea" placeholder="Example: 60 second faceless motivation reel Hinglish mein iPhone 16 promo" />

      <select id="type">
        <option value="video">🎥 Full Video (Script + Voice + Edit)</option>
        <option value="script">📜 Script + Hook + SEO</option>
        <option value="pricecomparison">🛒 Price Comparison</option>
        <option value="affiliate">💰 Affiliate + Earning Idea</option>
        <option value="story">📖 Story / Serial</option>
      </select>

      <textarea id="goal" placeholder="Extra details (optional)"></textarea>

      <button class="ultra" id="generateBtn">🔥 ONE CLICK GENERATE FULL VIDEO + PRICES</button>
      <button class="voice" id="voiceBtn">🎤 Voice Input</button>
    </div>

    <div class="status" id="status">Ready</div>
    <div class="result" id="output">Your result will appear here...</div>

    <div class="card">
      <h2>Live Price Comparison</h2>
      <div id="prices" class="price-box">Prices will show here...</div>
    </div>
  </div>

  <script>
    const ideaEl = document.getElementById("idea");
    const typeEl = document.getElementById("type");
    const goalEl = document.getElementById("goal");
    const outputEl = document.getElementById("output");
    const statusEl = document.getElementById("status");
    const pricesEl = document.getElementById("prices");
    const generateBtn = document.getElementById("generateBtn");
    const voiceBtn = document.getElementById("voiceBtn");

    async function generate() {
      const idea = ideaEl.value.trim();
      if (!idea) {
        outputEl.innerText = "⚠️ Pehle idea likho bhai!";
        return;
      }

      generateBtn.disabled = true;
      statusEl.innerText = "🚀 Generating Full Video + Prices...";
      outputEl.innerText = "⏳ Thoda wait karo... AI bahut powerful ho gaya hai";

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idea, type: typeEl.value, goal: goalEl.value })
        });

        const data = await res.json();

        outputEl.innerText = data.script || data.result || "✅ Video ready! (Abhi placeholder hai)";
        
        if (data.prices) {
          let html = "";
          data.prices.forEach(p => {
            html += `<div style="margin:10px 0"><b>\( {p.platform}</b> → ₹ \){p.price} <a href="${p.link}" target="_blank">Buy</a></div>`;
          });
          pricesEl.innerHTML = html;
        }

        statusEl.innerText = "✅ Full Video + Prices Ready (No Watermark)";
      } catch (e) {
        outputEl.innerText = "❌ Error: " + e.message;
      }

      generateBtn.disabled = false;
    }

    // Voice Input (same as before)
    let recognitionInstance = null;
    function startVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return alert("Voice support nahi hai is browser mein");

      recognitionInstance = new SpeechRecognition();
      recognitionInstance.lang = "hi-IN";
      recognitionInstance.onresult = (e) => {
        ideaEl.value = e.results[0][0].transcript;
      };
      recognitionInstance.onend = () => voiceBtn.innerText = "🎤 Voice Input";
      recognitionInstance.start();
      voiceBtn.innerText = "🎤 Listening...";
    }

    generateBtn.addEventListener("click", generate);
    voiceBtn.addEventListener("click", startVoice);
  </script>
</body>
</html>
