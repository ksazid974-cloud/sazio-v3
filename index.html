<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0b1220,#111a30);
  color:white;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

input, select, textarea, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  background:#2563eb;
  color:white;
  font-weight:bold;
}

h1 { text-align:center; }
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>🚀 Sazio AI</h1>
<p>Creator + Analyzer + AI Brain</p>
</div>

<div class="card">
<h2>Generate Content</h2>

<input id="idea" placeholder="Apna idea likho..." />

<select id="type">
<option>video</option>
<option>story</option>
<option>post</option>
</select>

<textarea id="outputType" placeholder="script, hook, SEO, analysis, translation, compare, earning"></textarea>

<button onclick="generate()">Generate</button>

<button onclick="voice()">🎤 Voice</button>
<button onclick="copy()">Copy</button>
<button onclick="clearMemory()">Clear</button>

</div>

<div id="result" class="card"></div>

<div class="card">
<h3>What Sazio Can Do</h3>
<p>Creator AI, Analyzer, Translator, Price Compare, Earning Ideas, Multi-purpose AI Brain</p>
</div>

</div>

<script>

async function generate() {
  const idea = document.getElementById("idea").value;

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({idea})
  });

  const data = await res.json();
  document.getElementById("result").innerText = data.result;
}

function voice() {
  const recognition = new webkitSpeechRecognition();
  recognition.onresult = (e) => {
    document.getElementById("idea").value = e.results[0][0].transcript;
  };
  recognition.start();
}

function copy() {
  navigator.clipboard.writeText(document.getElementById("result").innerText);
}

function clearMemory() {
  document.getElementById("result").innerText = "";
}

</script>

</body>
</html>
