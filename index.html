<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio AI</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#0f172a;padding:20px;border-radius:15px;margin-bottom:20px}
input,select,textarea{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;background:#1e293b;color:#fff}
button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;background:#fff;color:#000;font-weight:bold}
.result{margin-top:15px;background:#1e293b;padding:15px;border-radius:10px;white-space:pre-line}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>🚀 Sazio AI</h2>

<input id="idea" placeholder="Enter your idea">

<select id="type">
<option value="video">Video</option>
<option value="story">Story</option>
<option value="ad">Ad</option>
<option value="movie">Movie</option>
<option value="webseries">Web Series</option>
</select>

<textarea id="goal" placeholder="script, hook, SEO, analysis"></textarea>

<button onclick="generate()">Generate</button>

<div id="output" class="result">Result will appear here...</div>
</div>

<div class="card">
<h3>Live Example</h3>
<div id="liveExample">-</div>
</div>

</div>

<script>
function updateLive(){
const i=document.getElementById("idea").value||"-";
const t=document.getElementById("type").value||"-";
const g=document.getElementById("goal").value||"-";
document.getElementById("liveExample").innerText=`Idea: ${i}\nType: ${t}\nOutput: ${g}`;
}

document.getElementById("idea").addEventListener("input",updateLive);
document.getElementById("goal").addEventListener("input",updateLive);
document.getElementById("type").addEventListener("change",updateLive);

async function generate(){
const idea=document.getElementById("idea").value;
const type=document.getElementById("type").value;
const goal=document.getElementById("goal").value;

const res=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({idea,type,output:goal})
});

const data=await res.json();
document.getElementById("output").innerText=data.result;
}
</script>

</body>
</html>
