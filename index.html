<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio AI</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#0f172a,#020617);color:#fff}
.container{max-width:980px;margin:auto;padding:20px}
.hero{text-align:center;padding:28px;background:rgba(255,255,255,0.05);border-radius:20px;margin-bottom:20px}
.badge{background:#fff;color:#000;padding:6px 12px;border-radius:20px;font-size:12px}
.grid{display:grid;gap:20px}
.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:20px}
input,select,textarea{width:100%;padding:12px;margin-top:10px;border-radius:10px;background:#1e293b;color:#fff;border:none}
button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;cursor:pointer}
.primary{background:#fff;color:#000}
.voice{background:#2563eb;color:#fff}
.result{margin-top:15px;background:#1e293b;padding:15px;border-radius:15px;white-space:pre-line}
</style>
</head>

<body>
<div class="container">

<div class="hero">
<div class="badge">100% FREE</div>
<h1>🚀 Sazio AI</h1>
<p>Create viral content, hooks, scripts, SEO instantly</p>
</div>

<div class="grid">

<div class="card">
<h2>Generate Content</h2>

<input id="idea" placeholder="Enter idea">
<select id="type">
<option value="video">Video</option>
<option value="story">Story</option>
</select>

<textarea id="goal" placeholder="script, hook, SEO"></textarea>

<button class="primary" onclick="generate()">Generate</button>
<button class="voice" onclick="startVoice()">Voice</button>

<div id="output" class="result">Result here...</div>
</div>

<div class="card">
<h2>Live Example</h2>
<div id="liveExample">
Idea: -<br>
Type: -<br>
Output: -
</div>
</div>

</div>
</div>

<script>
function updateLiveExample(){
const idea=document.getElementById("idea").value||"-";
const type=document.getElementById("type").value||"-";
const goal=document.getElementById("goal").value||"-";

document.getElementById("liveExample").innerHTML=
`Idea: ${idea}<br>Type: ${type}<br>Output: ${goal}`;
}

document.getElementById("idea").addEventListener("input",updateLiveExample);
document.getElementById("goal").addEventListener("input",updateLiveExample);
document.getElementById("type").addEventListener("change",updateLiveExample);

async function generate(){
const idea=document.getElementById("idea").value;
const type=document.getElementById("type").value;
const goal=document.getElementById("goal").value;

const res=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({idea,type,output:goal})});

const data=await res.json();
document.getElementById("output").innerText=data.result;
}

function startVoice(){
alert("Voice working later");
}
</script>

</body>
</html>
