<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio V3</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.hero {
  text-align: center;
  padding: 30px 15px;
}

.hero h1 {
  font-size: 28px;
}

.section {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

.input, .textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

.button {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  background: white;
  color: black;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.output {
  margin-top: 15px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Sazio V3</h1>
<p>Create anything. Any idea. Any content.</p>
</div>

<div class="section">
<h2>AI Content Generator</h2>

<input id="idea" class="input" placeholder="Enter your idea (e.g. gym video, travel vlog, product ad)" />

<input id="type" class="input" placeholder="Content type (video, reel, ad, story, post)" />

<textarea id="goal" class="textarea" placeholder="What do you want? (script, idea, scenes, SEO, all)"></textarea>

<button class="button" onclick="generate()">Generate</button>

<div id="output" class="output">Your result will appear here...</div>
</div>

</div>

<script>
function generate() {
  let idea = document.getElementById("idea").value;
  let type = document.getElementById("type").value;
  let goal = document.getElementById("goal").value;

  let result = `
TITLE IDEAS:
- Best ${idea} for ${type}
- Viral ${type} about ${idea}

CONCEPT:
This content focuses on ${idea} designed for ${type} audience.

STRUCTURE:
1. Strong hook
2. Main content
3. Highlight moment
4. Ending

OUTPUT GOAL:
${goal}

SEO TAGS:
${idea}, ${type}, viral content, trending
`;

  document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
